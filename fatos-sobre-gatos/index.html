<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatos sobre Gatos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🐾 Fatos sobre Gatos</h1>
        <p class="subtitulo">Descubra curiosidades felinas</p>

        <div class="caixa-formulario">
            <form id="form">
                <label for="tamanhoTexto">Informe o tamanho do texto:</label>
                <div class="linha-input">
                    <input type="number" id="tamanhoTexto" placeholder="Entre 20 e 250">
                    <button type="submit">Buscar 🐱</button>
                </div>
                <span id="mensagemErro"></span>
            </form>

            <div id="resultado"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
